services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-memory}
      POSTGRES_USER: ${POSTGRES_USER:-memory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev123}
    volumes:
      - ./data/pg:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-memory}"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  index:
    build:
      context: .
      dockerfile: services/index/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-memory}
      POSTGRES_USER: ${POSTGRES_USER:-memory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev123}
      OLLAMA_URL: http://ollama:11434
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      EMBED_DIMS: ${EMBED_DIMS:-768}
      REPOS_ROOT: /repos
      ACTIVE_PROVIDERS: ${ACTIVE_PROVIDERS:-filesystem}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPOS: ${GITHUB_REPOS:-}
      GITHUB_API_URL: ${GITHUB_API_URL:-https://api.github.com}
      GITHUB_DEFAULT_BRANCH: ${GITHUB_DEFAULT_BRANCH:-main}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-secret-token-change-in-prod}
      DEFAULT_NAMESPACE: ${DEFAULT_NAMESPACE:-default}
      RANKING_PATH_BOOST: ${RANKING_PATH_BOOST:-0.1}
      RANKING_FRESHNESS_BOOST: ${RANKING_FRESHNESS_BOOST:-0.0}
      RANKING_FRESHNESS_WINDOW_HOURS: ${RANKING_FRESHNESS_WINDOW_HOURS:-168}
    volumes:
      - ./repos:/repos:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  standards:
    build:
      context: .
      dockerfile: services/standards/Dockerfile
    environment:
      REPOS_ROOT: /repos
      STANDARDS_REPO: ${STANDARDS_REPO:-enterprise-standards}
      DEFAULT_STANDARDS_VERSION: ${DEFAULT_STANDARDS_VERSION:-local}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-secret-token-change-in-prod}
    volumes:
      - ./repos:/repos:ro
    networks:
      - internal

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      INDEX_URL: http://index:8081
      STANDARDS_URL: http://standards:8082
      OLLAMA_URL: http://ollama:11434
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-memory}
      POSTGRES_USER: ${POSTGRES_USER:-memory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev123}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-secret-token-change-in-prod}
      GATEWAY_MAX_BUNDLE_CHARS: ${GATEWAY_MAX_BUNDLE_CHARS:-40000}
      GATEWAY_DEFAULT_K: ${GATEWAY_DEFAULT_K:-12}
      BUNDLE_CACHE_TTL_SECONDS: ${BUNDLE_CACHE_TTL_SECONDS:-300}
      DEFAULT_NAMESPACE: ${DEFAULT_NAMESPACE:-default}
      MCP_ENABLED: ${MCP_ENABLED:-false}
      MCP_STDIO_ENABLED: ${MCP_STDIO_ENABLED:-false}
      POLICY_FILE: ${POLICY_FILE:-}
      POLICY_HOT_RELOAD: ${POLICY_HOT_RELOAD:-false}
      GATEWAY_MAX_SOURCES: ${GATEWAY_MAX_SOURCES:-50}
      METRICS_BIND_HOST: "0.0.0.0"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      index:
        condition: service_started
      standards:
        condition: service_started
    networks:
      - internal

  prometheus:
    image: prom/prometheus:latest
    profiles:
      - monitoring
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/alerts:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=24h"
    ports:
      - "9090:9090"
    networks:
      - internal

  grafana:
    image: grafana/grafana:latest
    profiles:
      - monitoring
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  ollama_data:
  prometheus_data:
  grafana_data:
